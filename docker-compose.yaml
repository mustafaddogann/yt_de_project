x-airflow-common: &airflow-common
  build:
    context: ./containers/airflow/
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: local-dev-secret-key
    PYTHONPATH: /opt/airflow/dags
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp/sa.json
    AIRFLOW_VAR_GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    AIRFLOW_VAR_GCS_LANDING_BUCKET: ${GCS_LANDING_BUCKET}
    AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: google-cloud-platform://?extra__google_cloud_platform__key_path=%2Fopt%2Fairflow%2Fgcp%2Fsa.json&extra__google_cloud_platform__project=${GCP_PROJECT_ID}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./temp:/opt/airflow/temp
    - ${GCP_SA_KEY_PATH}:/opt/airflow/gcp/sa.json:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    container_name: yt-de-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: yt-de-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname admin --lastname user \
          --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: yt-de-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: yt-de-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: yt-de-metabase
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres-db-volume:
